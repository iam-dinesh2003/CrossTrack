# ─── MySQL Database ───
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/crosstrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:crosstrack_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── Server ───
server.port=${PORT:8080}

# ─── JWT ───
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:2592000000}

# ─── Ghost Job Scheduler ───
ghost.timeout.days=21
ghost.check.cron=0 0 0 * * *

# ─── Google OAuth (Gmail API) ───
# Get these from: https://console.cloud.google.com/apis/credentials
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/gmail/callback}

# ─── File Uploads ───
crosstrack.uploads.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── AI / LLM Configuration ───
# Provider: 'gemini' (FREE tier!) or 'openai'
crosstrack.ai.provider=gemini
crosstrack.ai.api-key=${GEMINI_API_KEY:}
crosstrack.ai.model=gemini-2.5-flash
crosstrack.ai.max-tokens=4000
crosstrack.ai.temperature=0.7

# ─── Tavily Web Search ───
tavily.api-key=${TAVILY_API_KEY:}
tavily.search-depth=basic
tavily.max-results=3

# ─── Cost Controls (daily caps per user) ───
crosstrack.ai.daily-chat-limit=30
crosstrack.ai.daily-search-limit=15
crosstrack.ai.daily-generation-limit=10

# ─── Email / SMTP (for OTP password reset) ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
crosstrack.otp.expiry-minutes=10

# ─── Follow-Up Reminders ───
followup.check.cron=0 0 9 * * *
followup.gentle.days=7
followup.second.days=14
followup.final.days=21

# ─── CORS (comma-separated allowed origins for production) ───
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
